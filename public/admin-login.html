<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0f0f0f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 40px 32px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 24px 60px rgba(0,0,0,.5);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 40px; height: 40px;
      background: #e91e8c;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 22px; height: 22px; fill: #fff; }
    .logo-text { font-size: 18px; font-weight: 800; color: #fff; }
    .logo-text span { color: #e91e8c; }
    h1 { font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 6px; }
    p { font-size: 13px; color: #666; margin-bottom: 28px; }
    label { display: block; font-size: 12px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 6px; }
    input {
      width: 100%;
      background: #111;
      border: 1.5px solid #2a2a2a;
      border-radius: 10px;
      padding: 13px 14px;
      font-size: 14px;
      color: #fff;
      outline: none;
      margin-bottom: 16px;
      transition: border-color .2s;
    }
    input:focus { border-color: #e91e8c; }
    input::placeholder { color: #444; }
    .btn {
      width: 100%;
      background: #e91e8c;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 15px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: opacity .2s;
      margin-top: 4px;
    }
    .btn:hover { opacity: .88; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .erro { font-size: 13px; color: #e53935; font-weight: 600; margin-top: 10px; text-align: center; min-height: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7v10l10 5 10-5V7L12 2zm0 2.18L20 8.5v7L12 19.5 4 15.5v-7L12 4.18z"/></svg>
      </div>
      <div class="logo-text">Checkout <span>Admin</span></div>
    </div>
    <h1>Entrar</h1>
    <p>Acesse o painel de gerenciamento</p>
    <label>Usuário</label>
    <input type="text" id="usuario" placeholder="admin" />
    <label>Senha</label>
    <input type="password" id="senha" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()" />
    <button class="btn" id="btnLogin" onclick="login()">Entrar</button>
    <div class="erro" id="erroMsg"></div>
  </div>
  <script>
    async function login() {
      const btn = document.getElementById('btnLogin');
      const erro = document.getElementById('erroMsg');
      btn.disabled = true; btn.textContent = 'Entrando...';
      erro.textContent = '';
      const r = await fetch('/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          usuario: document.getElementById('usuario').value,
          senha:   document.getElementById('senha').value,
        }),
      });
      if (r.ok) {
        window.location.href = '/admin';
      } else {
        erro.textContent = 'Usuário ou senha incorretos';
        btn.disabled = false; btn.textContent = 'Entrar';
      }
    }
  </script>
</body>
</html>
